services:

  data:
    image: postgres:18
    volumes:
      - postgres:/var/lib/postgresql
    networks:
      - net_api
    secrets:
      - postgres_user
      - postgres_password
    environment:
      POSTGRES_USER_FILE: '/run/secrets/postgres_user'
      POSTGRES_PASSWORD_FILE: '/run/secrets/postgres_password'
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
    ports:
      - 5432:5432
  
  api:
    image: api-fast:v1
    networks:
      - net_api
    secrets:
      - postgres_user
      - postgres_password
      - postgres_host
      - postgres_db
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
    ports:
      - 8000:8000

volumes:
  postgres:
    name: postgres
secrets:
  postgres_password:
    external: true
  postgres_user:
    external: true
  postgres_host:
    external: true
  postgres_db:
    external: true

networks:
  net_api:
    driver: overlay
    ipam:
      config:
        - subnet: 10.10.10.0/28